<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .texto{
            color:red;
        }
        .campo{
            border:1px solid blue;
        }
        .botao{
            background-color:green;
            color:white;
        }
        fieldset{
            border:1px solid red;
        }
    </style>
</head>
<body>
    <form>
        <fieldset>
            <legend>Cadastro do Firebase</legend>
            <p class="texto">CPF:</p> <input type="text" class="campo" placeholder="Digite seu cpf" maxlength="11" minlength="11" required><br><br>
            <p class="texto">EMAIL:</p> <input type="text" class="campo" placeholder="Digite seu email" maxlength="30" minlength="11" required><br><br>
            <p class="texto">NOME:</p> <input type="text" class="campo" placeholder="Digite seu nome" maxlength="50" minlength="11" required><br><br>
            <p class="texto">SENHA:</p> <input type="text" class="campo" placeholder="Digite sua senha" maxlength="10" minlength="5" required><br><br>
            <p class="texto">TELEFONE:</p> <input type="text" class="campo" placeholder="Digite seu telefone" maxlength="11" minlength="11" required><br><br>
            <input type="submit" value="Cadastrar" class="botao">
        </fieldset>
    </form>
</body>
</html>
